<!DOCTYPE html>
<html>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <head>
    <title>Darkness Adaptation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div>
      <table>
        <tr>
          <th>Population</th>
          <th>Avg antenna size</th>
          <th>Avg eye size</th>
          <th>Avg pigmentation</th>
        </tr>
        <tr>
          <td id="population">0</td>
          <td id="avgAntenna">0</td>
          <td id="avgEye">0</td>
          <td id="avgPigment">0</td>
        </tr>
      </table>
      
      <button onclick="population.push(new Cell())">add surface form</button>
      <button onclick="population.push(new Cell(null, null,
                        [{ v: 3, dom: 1 }, { v: 3, dom: 1 }],
                        [{ v: 0, dom: -1 }, { v: 0, dom: -1 }],
                        [{ v: 0, dom: -1 }, { v: 0, dom: -1 }]
                        ));">add cave form</button>
      <br>
      <label for="simSpeed">sim speed: </label>
      <input id="simSpeed" type="range" min="1" max="20" value="1" oninput="parameters()">
      <br>
      <label for="lightLevel">light level: </label>
      <input id="lightLevel" type="range" min="0" max="1" step="0.1" value="1" oninput="parameters()">
    </div>
    
    <div>
      <canvas id="world"></canvas>
    </div>
    
    <script src="classes.js"></script>
    <script src="render.js"></script>
    <script src="script.js"></script>
  </body>
</html>
